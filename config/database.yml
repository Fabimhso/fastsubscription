
default: &default
  adapter: postgresql
  encoding: unicode
  
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: postgres
  password: 1234
  host: localhost
  port: 5432


development:
  <<: *default
  database: subscription_saas_development

 
test:
  <<: *default
  database: subscription_saas_test


production:
  primary: &primary_production
    <<: *default
    database: subscription_saas_production
    username: postgres
    password: 1234
    host: localhost
    port: 5432
  cache:
    <<: *primary_production
    database: subscription_saas_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: subscription_saas_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: subscription_saas_production_cable
    migrations_paths: db/cable_migrate
